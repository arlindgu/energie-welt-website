name: Deploy

# Builds and pushes the website image to GHCR. Deployment to the cluster is
# handled by ArgoCD (GitOps) from the deploy-config repo — this workflow does
# NOT touch the cluster:
#
#   run this workflow -> image pushed as :<sha> (and :latest)
#     -> bump images[].newTag to <sha> in deploy-config
#        (apps/energie-welt-website/kustomization.yaml), open a PR
#     -> on merge ArgoCD syncs.
on:
  workflow_dispatch:
  push:
    branches: [master, main, gitops-deploy]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: echo "SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/thread-it-org/energie-welt-website:${{ env.SHA_SHORT }}
            ghcr.io/thread-it-org/energie-welt-website:latest

      - name: Next step (GitOps deploy)
        run: |
          echo "::notice::Image pushed as :${SHA_SHORT}."
          echo "::notice::To deploy, bump images[].newTag to ${SHA_SHORT} in deploy-config:"
          echo "::notice::  apps/energie-welt-website/kustomization.yaml  (open a PR) -> ArgoCD syncs."
