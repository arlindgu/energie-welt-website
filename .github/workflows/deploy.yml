name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        type: choice
        options:
          - qas
          - production

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: echo "SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/thread-it-org/energie-welt-website:${{ env.SHA_SHORT }}
            ghcr.io/thread-it-org/energie-welt-website:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Set environment variables
        run: |
          if [ "${{ inputs.environment }}" = "qas" ]; then
            echo "NAMESPACE=energie-welt-qas" >> $GITHUB_ENV
          else
            echo "NAMESPACE=energie-welt" >> $GITHUB_ENV
          fi
          echo "SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - uses: actions/checkout@v4

      - name: Apply Kubernetes manifests
        run: |
          if [ "${{ inputs.environment }}" = "qas" ]; then
            kubectl apply -f k8s/qas/
          else
            kubectl apply -f k8s/production/
          fi

      - name: Deploy website
        run: |
          kubectl set image deployment/website \
            website=ghcr.io/thread-it-org/energie-welt-website:${{ env.SHA_SHORT }} \
            -n ${{ env.NAMESPACE }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/website -n ${{ env.NAMESPACE }} --timeout=120s
