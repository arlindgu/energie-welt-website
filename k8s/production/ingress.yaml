apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: energie-welt
  namespace: energie-welt
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - energie-welt.ch
        - www.energie-welt.ch
      secretName: energie-welt-ch-tls
  rules:
    - host: energie-welt.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: website
                port:
                  number: 80
    - host: www.energie-welt.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: website
                port:
                  number: 80
