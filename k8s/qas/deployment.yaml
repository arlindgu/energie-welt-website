apiVersion: v1
kind: Service
metadata:
  name: website
  namespace: energie-welt-qas
spec:
  selector:
    app: website
  ports:
    - port: 80
      targetPort: 4321
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  namespace: energie-welt-qas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: website
          image: ghcr.io/thread-it-org/energie-welt-website:latest
          ports:
            - containerPort: 4321
          env:
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: resend-secret
                  key: api-key
          readinessProbe:
            httpGet:
              path: /
              port: 4321
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 256Mi
              cpu: 200m
